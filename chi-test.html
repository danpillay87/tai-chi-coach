<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#0a1410}</style></head>
<body>
<canvas id="c" width="600" height="1240"></canvas>
<script>
const J={0:[-0.001,-1.261],11:[0.323,-1.001],12:[-0.356,-0.998],13:[0.496,-1.461],14:[-0.517,-1.474],15:[0.251,-1.956],16:[-0.318,-1.923],23:[0.238,-0.008],24:[-0.238,0.008],25:[0.289,0.744],26:[-0.305,0.728],27:[0.378,1.406],28:[-0.362,1.421]};
const S=300,CX=300,CY=760;
const P=i=>[CX+J[i][0]*S, CY+J[i][1]*S];
const cv=document.getElementById('c'),x=cv.getContext('2d');

// ground
x.fillStyle='#0d1c14';x.fillRect(0,0,600,1240);
const gr=x.createRadialGradient(300,520,0,300,520,760);
gr.addColorStop(0,'#183226');gr.addColorStop(1,'rgba(13,28,20,0)');
x.fillStyle=gr;x.fillRect(0,0,600,1240);

const CREAM='#f4eeda', JADE='rgba(60,220,168,', GOLD='#e8c07a';

// segment list: [a,b,wA,wB]
const SEG=[
  [11,13,50,40],[13,15,40,27],   // L arm
  [12,14,50,40],[14,16,40,27],   // R arm
  [23,25,68,54],[25,27,54,36],   // L leg
  [24,26,68,54],[26,28,54,36],   // R leg
];
function capsule(a,b,wa,wb,col){
  const A=P(a),B=P(b);
  const dx=B[0]-A[0],dy=B[1]-A[1],len=Math.hypot(dx,dy)||1,nx=-dy/len,ny=dx/len;
  x.beginPath();
  x.moveTo(A[0]+nx*wa/2,A[1]+ny*wa/2);
  x.lineTo(B[0]+nx*wb/2,B[1]+ny*wb/2);
  x.arc(B[0],B[1],wb/2,Math.atan2(ny,nx),Math.atan2(-ny,-nx),false);
  x.lineTo(A[0]-nx*wa/2,A[1]-ny*wa/2);
  x.arc(A[0],A[1],wa/2,Math.atan2(-ny,-nx),Math.atan2(ny,nx),false);
  x.closePath(); x.fillStyle=col; x.fill();
}
function joint(i,r,col){const p=P(i);x.beginPath();x.arc(p[0],p[1],r,0,7);x.fillStyle=col;x.fill();}
function torso(col){
  const ls=P(11),rs=P(12),rh=P(24),lh=P(23);
  x.beginPath();
  x.moveTo(ls[0],ls[1]);x.lineTo(rs[0],rs[1]);
  x.lineTo(rh[0]-6,rh[1]);x.lineTo(lh[0]+6,lh[1]);
  x.closePath();x.fillStyle=col;x.fill();
}
function bodyShapes(col){
  torso(col);
  for(const[a,b,wa,wb]of SEG)capsule(a,b,wa,wb,col);
  // fill joints to smooth
  joint(11,28,col);joint(12,28,col);joint(13,21,col);joint(14,21,col);
  joint(23,35,col);joint(24,35,col);joint(25,28,col);joint(26,28,col);
  joint(15,14,col);joint(16,14,col);joint(27,18,col);joint(28,18,col);
  // neck + head
  const sc=[(P(11)[0]+P(12)[0])/2,(P(11)[1]+P(12)[1])/2],n=P(0);
  const hr=Math.hypot(n[0]-sc[0],n[1]-sc[1])*0.72;
  x.beginPath();x.moveTo(sc[0]-22,sc[1]);x.lineTo(sc[0]+22,sc[1]);x.lineTo(n[0]+13,n[1]);x.lineTo(n[0]-13,n[1]);x.closePath();x.fillStyle=col;x.fill();
  x.beginPath();x.arc(n[0],n[1]-hr*0.15,hr,0,7);x.fillStyle=col;x.fill();
}

// 1) outer glow
x.save();x.filter='blur(14px)';x.globalAlpha=.55;bodyShapes('rgba(60,220,168,0.9)');x.restore();
x.filter='none';x.globalAlpha=1;
// 2) jade under-shade (offset down-right)
x.save();x.translate(4,7);bodyShapes('#1f5b46');x.restore();
// 3) body fill cream
bodyShapes(CREAM);
// 4) rim light (offset up-left, thin lighter)
x.save();x.globalCompositeOperation='overlay';x.translate(-3,-5);x.globalAlpha=.5;bodyShapes('#ffffff');x.restore();
x.globalAlpha=1;x.globalCompositeOperation='source-over';
// 5) head sheen
const n=P(0),sc=[(P(11)[0]+P(12)[0])/2,(P(11)[1]+P(12)[1])/2];const hr=Math.hypot(n[0]-sc[0],n[1]-sc[1])*0.72;
const hg=x.createRadialGradient(n[0]-hr*0.3,n[1]-hr*0.4,2,n[0],n[1]-hr*0.15,hr);
hg.addColorStop(0,'#fffef8');hg.addColorStop(1,'rgba(232,192,122,0)');
x.beginPath();x.arc(n[0],n[1]-hr*0.15,hr,0,7);x.fillStyle=hg;x.fill();
</script>
</body></html>
